<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Image -->
    <img height="230" src="https://images.unsplash.com/photo-1535535112387-56ffe8db21ff?q=80&w=874&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Train Image">

    <!-- Table -->
    <table>
        <caption>Employee Details</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Favorite Language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ruchi</td>
                <td>Programmer</td>
                <td>JavaScript</td>
            </tr>

            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">Java</td>
            </tr>

            <tr>
                <td colspan="2">Rahul</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Footer</td>
                <td>End</td>
            </tr>
        </tfoot>
    </table>

    <!-- Unordered List -->
    <ul type="square">
        <li>Ruchi</li>
        <li>Ruhi</li>
        <li>Ruchika</li>
    </ul>

    <!-- Ordered List -->
    <ol type="A">
        <li>Ruchi</li>
        <li>Rohan</li>
        <li>Shubham</li>
    </ol>

</body>
</html>
